spring:
  application:
    name: ownpic-backend
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com/postgres}
    username: ${DB_USERNAME:postgres.oyauhpbtobbwoilbvcxh}
    password: ${DB_PASSWORD:dnjzmaos88*C}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  mvc:
    problemdetails:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

ownpic:
  trustmark:
    encoder-path: ${TRUSTMARK_ENCODER_PATH:./models/trustmark_encoder_Q.onnx}
    decoder-path: ${TRUSTMARK_DECODER_PATH:./models/trustmark_decoder_Q.onnx}
  sscd:
    model-path: ${SSCD_MODEL_PATH:./models/sscd.onnx}
  dinov2:
    model-path: ${DINOV2_MODEL_PATH:./models/dinov2_vits14_cls.onnx}
  jwt:
    secret: ${JWT_SECRET:ownpic-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  storage:
    base-path: ${STORAGE_PATH:./uploads}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
