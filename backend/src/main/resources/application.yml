spring:
  application:
    name: ownpic-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:5432/postgres}
    username: ${DB_USERNAME:postgres.oyauhpbtobbwoilbvcxh}
    password: ${DB_PASSWORD:dnjzmaos88*C}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
