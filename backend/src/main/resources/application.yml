spring:
  application:
    name: ownpic-backend
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com/postgres}
    username: ${DB_USERNAME:postgres.idnchlxoyqedtwvixtya}
    password: ${DB_PASSWORD:dnjzmaos88*C}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

  mvc:
    problemdetails:
      enabled: true

  logging:
    level:
      com.ownpic: DEBUG

server:
  port: ${SERVER_PORT:8080}

ownpic:
  trustmark:
    encoder-path: ${TRUSTMARK_ENCODER_PATH:./models/trustmark_encoder_Q.onnx}
    decoder-path: ${TRUSTMARK_DECODER_PATH:./models/trustmark_decoder_Q.onnx}
  sscd:
    model-path: ${SSCD_MODEL_PATH:./models/sscd.onnx}
  dinov2:
    model-path: ${DINOV2_MODEL_PATH:./models/dinov2_vits14_cls.onnx}
  jwt:
    secret: ${JWT_SECRET:ownpic-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  storage:
    base-path: ${STORAGE_PATH:./uploads}
  naver:
    client-id: ${NAVER_CLIENT_ID:mFs16l2rir71yzSBOlXE}
    client-secret: ${NAVER_CLIENT_SECRET:5PamyFVcE6}
  # Google Cloud Vision API (WebDetection)
  # 활성화: SPRING_PROFILES_ACTIVE에 google 추가
  # 인증 (둘 중 하나):
  #   1. API 키: GOOGLE_VISION_API_KEY 환경변수
  #   2. 서비스 계정: GOOGLE_APPLICATION_CREDENTIALS 환경변수
  google:

    selenium-enabled: ${GOOGLE_SELENIUM_ENABLED:true}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}

logging:
  level:
    com.ownpic: DEBUG
