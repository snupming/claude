spring:
  application:
    name: ownpic-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ownpic}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:ownpic-dev-secret-key-must-be-at-least-256-bits-long-for-hs256}
    access-token-expiration: ${JWT_ACCESS_EXPIRATION:900000}   # 15 min
    refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
